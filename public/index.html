<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>工作日志</title>
  <link rel="manifest" href="/manifest.json?v=3">
  <link rel="stylesheet" href="/style.css?v=3">
  <meta name="theme-color" content="#1a3a2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <header>
    <img src="/logo.png" alt="公司Logo" class="company-logo">
    <h1>工作日志</h1>
    <div class="context-bar" id="context-bar">
      <span id="weather-display"></span>
    </div>
    <div class="date-nav">
      <button id="prev-day" class="icon-btn">&#8249;</button>
      <input type="date" id="date-picker">
      <button id="next-day" class="icon-btn">&#8250;</button>
    </div>
  </header>

  <main>
    <section id="tab-tasks" class="tab active">
      <div class="add-task">
        <input type="text" id="task-input" placeholder="添加新任务..." maxlength="200" autocomplete="off">
        <button id="add-btn">+</button>
      </div>
      <ul id="task-list"></ul>
      <div id="task-empty" class="empty-state">
        <p>今天还没有任务</p>
        <p class="hint">点击上方添加今日任务</p>
      </div>

      <div class="media-section">
        <h3>今日记录</h3>
        <div class="media-actions">
          <button id="record-btn" class="media-btn">🎙 录音</button>
          <button id="camera-btn" class="media-btn">📷 拍照</button>
          <button id="upload-btn" class="media-btn">📁 上传</button>
          <input type="file" id="file-input" accept="image/*,video/*,audio/*" style="display:none">
        </div>
        <div id="recording-status" class="recording-status" style="display:none">
          <span class="recording-dot"></span> 录音中... <button id="stop-record">停止</button>
        </div>
        <div id="media-gallery" class="media-gallery"></div>
      </div>
    </section>

    <section id="tab-journal" class="tab">
      <div class="journal-summary">
        <h3>今日任务回顾</h3>
        <div id="journal-stats" class="stats"></div>
      </div>
      <div class="journal-editor">
        <h3>工作回顾</h3>
        <textarea id="journal-content" placeholder="写下今天的工作总结、收获和明天的计划..." rows="10"></textarea>
        <button id="save-journal" class="primary-btn">保存日志</button>
        <span id="journal-saved" class="saved-msg">已保存</span>
      </div>
    </section>

    <section id="tab-long" class="tab">
      <div class="add-task">
        <input type="text" id="long-task-input" placeholder="添加长期待办任务..." maxlength="200" autocomplete="off">
        <button id="add-long-btn">+</button>
      </div>
      <ul id="long-task-list"></ul>
      <div id="long-task-empty" class="empty-state">
        <p>没有长期任务</p>
        <p class="hint">添加跨日期的持续性任务</p>
      </div>
    </section>

    <section id="tab-history" class="tab">
      <div id="history-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="tasks">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      <span>任务</span>
    </button>
    <button class="nav-btn" data-tab="journal">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      <span>日志</span>
    </button>
    <button class="nav-btn" data-tab="long">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/></svg>
      <span>长期</span>
    </button>
    <button class="nav-btn" data-tab="history">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      <span>历史</span>
    </button>
  </nav>

  <script src="/app.js?v=3"></script>
  <script>
    // Unregister old service workers to force fresh cache
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      }).then(() => navigator.serviceWorker.register('/sw.js?v=3'));
    }
  </script>
</body>
</html>
