<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>工作日志</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <header>
    <h1>工作日志</h1>
    <div class="date-nav">
      <button id="prev-day" class="icon-btn">&#8249;</button>
      <span id="current-date"></span>
      <button id="next-day" class="icon-btn">&#8250;</button>
    </div>
  </header>

  <main>
    <section id="tab-tasks" class="tab active">
      <div class="add-task">
        <input type="text" id="task-input" placeholder="添加新任务..." maxlength="200">
        <button id="add-btn">+</button>
      </div>
      <ul id="task-list"></ul>
      <div id="task-empty" class="empty-state">
        <p>今天还没有任务</p>
        <p class="hint">点击上方添加今日任务</p>
      </div>
    </section>

    <section id="tab-journal" class="tab">
      <div class="journal-summary">
        <h3>今日任务回顾</h3>
        <div id="journal-stats" class="stats"></div>
      </div>
      <div class="journal-editor">
        <h3>工作回顾</h3>
        <textarea id="journal-content" placeholder="写下今天的工作总结、收获和明天的计划..." rows="10"></textarea>
        <button id="save-journal" class="primary-btn">保存日志</button>
        <span id="journal-saved" class="saved-msg">已保存</span>
      </div>
    </section>

    <section id="tab-history" class="tab">
      <div id="history-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="tasks">
      <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      <span>任务</span>
    </button>
    <button class="nav-btn" data-tab="journal">
      <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
      <span>日志</span>
    </button>
    <button class="nav-btn" data-tab="history">
      <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      <span>历史</span>
    </button>
  </nav>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
